<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bonfils Light</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
}

#header {
  background:#000;
  padding:14px;
  text-align:center;
  font-weight:bold;
}

.screen {
  display:none;
  max-width:400px;
  margin:60px auto;
  background:#1c1c1c;
  padding:20px;
  border-radius:10px;
}

input {
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:6px;
}

button {
  width:100%;
  padding:12px;
  margin-top:6px;
  background:#00c853;
  border:none;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

.google {
  background:#4285F4;
}

#app {
  display:none;
  padding:20px;
}

.post {
  background:#222;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
}
</style>
</head>

<body>

<div id="header">BONFILS LIGHT</div>

<!-- LOGIN -->
<div id="loginScreen" class="screen" style="display:block;">
  <h3>Login</h3>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Login</button>
  <button onclick="signup()">Create Account</button>
  <button class="google" onclick="googleLogin()">Continue with Google</button>
</div>

<!-- PROFILE -->
<div id="profileScreen" class="screen">
  <h3>Profile Setup</h3>

  <input id="username" placeholder="Username">
  <input id="bg" placeholder="Background color (#111)">
  
  <button onclick="saveProfile()">Continue</button>
</div>

<!-- APP -->
<div id="app">
  <h3 id="welcome"></h3>

  <input id="postText" placeholder="Write something...">
  <button onclick="post()">Post</button>

  <div id="feed"></div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>

/* 🔥 YOUR FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyCikwfRDsV1FsW1RZnKxqQbO1HOWGaIsZkU",
  authDomain: "blt-chat-system.firebaseapp.com",
  projectId: "blt-chat-system",
  storageBucket: "blt-chat-system.appspot.com",
  messagingSenderId: "1006452442964",
  appId: "1:1006452442964:web:9e44c2f27df77539986ac1"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let user;

/* ---------------- AUTH ---------------- */

function login() {
  auth.signInWithEmailAndPassword(email.value, password.value)
    .catch(e => alert(e.message));
}

function signup() {
  auth.createUserWithEmailAndPassword(email.value, password.value)
    .catch(e => alert(e.message));
}

function googleLogin() {
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider)
    .catch(e => alert(e.message));
}

/* ---------------- AUTH STATE ---------------- */

auth.onAuthStateChanged(u => {
  if (u) {
    user = u;
    checkProfile();
  }
});

/* ---------------- PROFILE ---------------- */

function checkProfile() {
  db.collection("users").doc(user.uid).get()
    .then(doc => {
      if (doc.exists) {
        applyTheme(doc.data());
        enterApp(doc.data());
      } else {
        show("profileScreen");
      }
    });
}

/* ---------------- SAVE PROFILE ---------------- */

function saveProfile() {
  const data = {
    username: "@" + username.value,
    bg: bg.value || "#0f0f0f"
  };

  db.collection("users").doc(user.uid).set(data)
    .then(() => {
      applyTheme(data);
      enterApp(data);
    });
}

/* ---------------- THEME ---------------- */

function applyTheme(data) {
  document.body.style.background = data.bg;
}

/* ---------------- ENTER APP ---------------- */

function enterApp(data) {
  show("app");
  welcome.innerText = "Welcome " + data.username;
  loadFeed();
}

/* ---------------- POSTS ---------------- */

function post() {
  if (!postText.value) return;

  db.collection("posts").add({
    text: postText.value,
    uid: user.uid,
    time: Date.now()
  });

  postText.value = "";
}

function loadFeed() {
  db.collection("posts")
    .orderBy("time", "desc")
    .onSnapshot(snap => {
      feed.innerHTML = "";
      snap.forEach(doc => {
        const p = doc.data();
        const div = document.createElement("div");
        div.className = "post";
        div.innerText = p.text;
        feed.appendChild(div);
      });
    });
}

/* ---------------- UI ---------------- */

function show(id) {
  document.querySelectorAll(".screen").forEach(s => s.style.display = "none");
  app.style.display = "none";
  document.getElementById(id).style.display = "block";
}

</script>

</body>
  </html>
